<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tutor worden | StuDoe</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
  <div class="header-inner">

    <div class="left-group">
      <button class="back-button" onclick="goBack()">←</button>

      <a href="index.html" class="logo">
        <img src="studoe-logo.png" alt="StuDoe logo">
      </a>
    </div>

    <nav>
      <a href="index.html">Start</a>
      <a href="tutors.html">Tutors zoeken</a>
      <a href="login.html">Tutor worden</a>
      <a href="contact.html">Contact</a>
    </nav>

  </div>
</header>
  <main>
    <section class="page-header">
      <div class="wrapper">
        <h1 class="page-title">Tutor worden</h1>
        <p class="page-subtitle">
          Ben je student en wil je jouw kennis inzetten om leerlingen te begeleiden? Meld je hier aan.
        </p>
      </div>
    </section>

    <section class="content-block">
      <div class="wrapper">
        <div class="panel form-card">
          <h2>Aanmelden als tutor</h2>
          <p class="intro">
            Vul je gegevens in en zet de eerste stap om deel uit te maken van het StuDoe-platform.
          </p>

          <form onsubmit="return tutorAanmelden()">
            <div class="field">
              <label for="naam">Naam</label>
              <input id="naam" type="text" placeholder="Jouw volledige naam" required>
            </div>

            <div class="field">
              <label for="email">E-mailadres</label>
              <input id="email" type="email" placeholder="jouwmail@example.com" required>
            </div>

            <div class="field">
              <label for="vak">Vak</label>
              <input id="vak" type="text" placeholder="Bijvoorbeeld wiskunde of Frans" required>
            </div>

            <button class="btn btn-primary" type="submit">Aanmelding versturen</button>
          </form>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <div class="footer-inner">
      <p>© 2026 StuDoe — Jouw studiepartner</p>
    </div>
  </footer>

  <script>
    function tutorAanmelden(){
      alert("Je aanmelding werd succesvol verzonden.");
      return false;
    }
  </script>
<script>
function goBack(){
  window.history.back();
}
</script>
</body>
</html>
