<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | StuDoe</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
  <div class="header-inner">

    <div class="left-group">
      <button class="back-button" onclick="goBack()">←</button>

      <a href="index.html" class="logo">
        <img src="studoe-logo.png" alt="StuDoe logo">
      </a>
    </div>

    <nav>
      <a href="index.html">Start</a>
      <a href="tutors.html">Tutors zoeken</a>
      <a href="login.html">Tutor worden</a>
      <a href="contact.html">Contact</a>
    </nav>

  </div>
</header>

  <main>
    <section class="page-header">
      <div class="wrapper">
        <h1 class="page-title">Contact</h1>
        <p class="page-subtitle">
          Heb je een vraag over het platform, de tutors of een boeking? Neem gerust contact met ons op.
        </p>
      </div>
    </section>

    <section class="content-block">
      <div class="wrapper">
        <div class="panel form-card">
          <h2>Stuur ons een bericht</h2>
          <p class="intro">Wij nemen zo snel mogelijk contact met je op.</p>

          <form onsubmit="return berichtVersturen()">
            <div class="field">
              <label for="contactNaam">Naam</label>
              <input id="contactNaam" type="text" placeholder="Jouw naam" required>
            </div>

            <div class="field">
              <label for="contactEmail">E-mailadres</label>
              <input id="contactEmail" type="email" placeholder="jouwmail@example.com" required>
            </div>

            <div class="field">
              <label for="bericht">Bericht</label>
              <textarea id="bericht" placeholder="Typ hier je bericht" required></textarea>
            </div>

            <button class="btn btn-primary" type="submit">Bericht verzenden</button>
          </form>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <div class="footer-inner">
      <p>© 2026 StuDoe — Jouw studiepartner</p>
    </div>
  </footer>

  <script>
    function berichtVersturen(){
      alert("Je bericht werd verzonden.");
      return false;
    }
  </script>
<script>
function goBack(){
  window.history.back();
}
</script>
</body>
</html>
