<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boek een sessie | StuDoe</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <a href="index.html" class="logo">
      <img src="studoe-logo.png" alt="StuDoe logo">
    </a>

    <nav>
      <a href="index.html">Home</a>
      <a href="tutors.html">Zoek tutor</a>
      <a href="login.html">Word tutor</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <section class="page-section">
    <h1 class="page-title">Boek je sessie</h1>
    <p class="page-subtitle">Kies een datum en tijd voor je bijles.</p>
  </section>

  <section class="form-container">
    <div class="form-card">
      <h2>Boekingsformulier</h2>
      <p>Plan snel en eenvoudig je eerste sessie.</p>

      <form onsubmit="return boekingBevestigen()">
        <div class="field">
          <label for="datum">Datum</label>
          <input id="datum" type="date" required>
        </div>

        <div class="field">
          <label for="tijd">Tijd</label>
          <input id="tijd" type="time" required>
        </div>

        <button class="primary" type="submit">Bevestig boeking</button>
      </form>
    </div>
  </section>

  <footer>
    <p>© 2026 StuDoe — Jouw studiepartner</p>
  </footer>

  <script>
    function boekingBevestigen(){
      alert("Boeking bevestigd.");
      return false;
    }
  </script>

</body>
</html>
