<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sessie boeken | StuDoe</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
  <div class="header-inner">

    <div class="left-group">
      <button class="back-button" onclick="goBack()">←</button>

      <a href="index.html" class="logo">
        <img src="studoe-logo.png" alt="StuDoe logo">
      </a>
    </div>

    <nav>
      <a href="index.html">Start</a>
      <a href="tutors.html">Tutors zoeken</a>
      <a href="login.html">Tutor worden</a>
      <a href="contact.html">Contact</a>
    </nav>

  </div>
</header>

  <main>
    <section class="page-header">
      <div class="wrapper">
        <h1 class="page-title">Sessie boeken</h1>
        <p class="page-subtitle">
          Kies eenvoudig een datum en tijdstip voor jouw bijlesmoment.
        </p>
      </div>
    </section>

    <section class="content-block">
      <div class="wrapper">
        <div class="panel form-card">
          <h2>Boekingsformulier</h2>
          <p class="intro">Plan hier je eerste sessie met de tutor van jouw keuze.</p>

          <form onsubmit="return boekingBevestigen()">
            <div class="field">
              <label for="datum">Datum</label>
              <input id="datum" type="date" required>
            </div>

            <div class="field">
              <label for="tijd">Tijdstip</label>
              <input id="tijd" type="time" required>
            </div>

            <button class="btn btn-primary" type="submit">Boeking bevestigen</button>
          </form>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <div class="footer-inner">
      <p>© 2026 StuDoe — Jouw studiepartner</p>
    </div>
  </footer>

  <script>
    function boekingBevestigen(){
      alert("Je boeking is bevestigd.");
      return false;
    }
  </script>
<script>
function goBack(){
  window.history.back();
}
</script>
</body>
</html>
